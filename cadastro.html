<section class="page">

<h1>Crie sua Conta</h1>

<form id="cadastroForm">

<input
type="text"
id="nome"
placeholder="Nome Completo"
required>

<input
type="email"
id="email"
placeholder="E-mail"
required>

<input
type="password"
id="senha"
placeholder="Senha"
required>

<input
type="password"
id="confirmarSenha"
placeholder="Confirmar Senha"
required>

<button type="submit">
Cadastrar
</button>

</form>

</section>
